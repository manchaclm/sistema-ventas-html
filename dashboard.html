<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión de Ventas</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header>
        <h1>Mi Sistema de Ventas</h1>
        <div id="user-info">
            <span id="txt-usuario">Cargando usuario...</span>
            <button onclick="cerrarSesion()">Cerrar Sesión</button>
        </div>
    </header>

    <main class="container">
        
        <section id="seccion-admin" class="panel-control hidden">
            <h2>Panel de Control (Dueño)</h2>
            <hr>
            
            <div class="card">
                <h3>Porcentaje de Ganancias por Trabajador</h3>
                <table id="tabla-comisiones">
                    <thead>
                        <tr>
                            <th>Trabajador</th>
                            <th>Total Ventas</th>
                            <th>% Comisión</th>
                            <th>Ganancia Acumulada</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

            <div class="card">
                <h3>Lista de Trabajadores</h3>
                <button class="btn-primary"> + Agregar Trabajador</button>
                <ul id="lista-trabajadores"></ul>
            </div>
        </section>

        <section id="seccion-general">
            <div class="card">
                <h2>Registrar Nueva Venta</h2>
                <form id="form-venta">
                    <input type="text" placeholder="Nombre del Cliente" required>
                    <input type="number" placeholder="Monto total ($)" required>
                    <label>
                        <input type="checkbox" id="es-deudor"> ¿Es venta a crédito?
                    </label>
                    <button type="submit" class="btn-success">Guardar Venta</button>
                </form>
            </div>

            <div class="card">
                <h2>Control de Clientes y Deudores</h2>
                <table id="tabla-clientes">
                    <thead>
                        <tr>
                            <th>Cliente</th>
                            <th>Estado</th>
                            <th>Deuda ($)</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>

    </main>

    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>
</html>

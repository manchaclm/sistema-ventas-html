<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Sistema de Ventas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 15px;
            padding: 5px;
            background-color: #ffffff;
        }
        h1, h2, h3 {
            color: #000000;
            margin-top: 20px;
        }
        #user-info {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            margin-bottom: 15px;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #dddddd;
        }
        th {
            background-color: #f9f9f9;
        }
        .ganancia-verde, .estado-pagado {
            color: #27ae60;
            font-weight: bold;
        }
        .estado-pendiente {
            color: #e67e22;
            font-weight: bold;
        }
        input[type="text"], input[type="number"], select {
            padding: 8px;
            margin: 5px 0;
            width: 100%;
            max-width: 300px;
            display: block;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            padding: 8px 15px;
            cursor: pointer;
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-top: 5px;
        }
        .vendedor-subtexto {
            color: #777777;
            font-size: 0.85em;
            display: block;
        }
    </style>
</head>
<body>

    <h1>Mi Sistema de Ventas</h1>
    
    <div id="user-info">
        <label style="color: black; display: inline;">Simular Usuario:</label>
        <select id="selector-vendedor" onchange="cambiarUsuarioSimulado()">
            <option value="admin">Carlos (Dueño) - ADMIN</option>
        </select>
        <button onclick="reiniciarTodo()">Reset Datos</button>
    </div>

    <hr>

    <div id="seccion-administrador">
        <h2>Panel de Control (Dueño)</h2>
        <h3>Porcentaje de Ganancias por Trabajador</h3>
        <table>
            <thead>
                <tr>
                    <th>Trabajador</th>
                    <th>Total Ventas</th>
                    <th>% Comisión</th>
                    <th>Ganancia Acumulada</th>
                </tr>
            </thead>
            <tbody id="tabla-comisiones">
            </tbody>
        </table>

        <h3>Lista de Trabajadores</h3>
        <button onclick="agregarTrabajador()">+ Agregar Trabajador</button>
        <ul id="lista-trabajadores-texto">
        </ul>
        <hr>
    </div>

    <h2>Registrar Nueva Venta</h2>
    <form onsubmit="event.preventDefault(); guardarVenta();">
        <input type="text" id="nombre-cliente" placeholder="Nombre del Cliente">
        <input type="number" id="monto-total" placeholder="Monto total ($)">
        <label style="display: flex; align-items: center; gap: 5px; margin: 10px 0;">
            <input type="checkbox" id="es-credito"> ¿Es venta a crédito?
        </label>
        <button type="submit">Guardar Venta</button>
    </form>

    <h2 id="titulo-tabla-clientes">Control de Clientes y Deudores</h2>
    <table id="tabla-clientes">
        <thead>
            <tr>
                <th>Cliente</th>
                <th>Estado</th>
                <th>Deuda ($)</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>

    <script type="module">
        import { db, collection, addDoc, getDocs, doc, setDoc } from "./firebase-config.js";

        // Estructura de respaldo por si la base de datos inicia en blanco
        const datosIniciales = {
            ventas: [
                { id: 1, cliente: "Carlos Lopez", monto: 100, vendedorId: "admin", vendedorNom: "Carlos (Dueño) - ADMIN", credito: false, pagado: true },
                { id: 2, cliente: "Ruiz de la hermosa", monto: 150, vendedorId: "admin", vendedorNom: "Carlos (Dueño) - ADMIN", credito: false, pagado: true }
            ],
            comisiones: {
                "v1": { nombre: "Vendedor 1", porcentaje: 0.10, totalVendido: 0, ganancia: 0 },
                "v2": { nombre: "luis calvo", porcentaje: 0.05, totalVendido: 0, ganancia: 0 },
                "v3": { nombre: "luisa Suárez", porcentaje: 0.08, totalVendido: 0, ganancia: 0 }
            }
        };

        let BD = { ventas: [], comisiones: {} };

        // 1. Descargar datos de la nube al abrir la app
        async function cargarDatosDeLaNube() {
            try {
                const querySnapshot = await getDocs(collection(db, "sistema_ventas_bd"));
                let existeGlobal = false;

                querySnapshot.forEach((doc) => {
                    if (doc.id === "global") {
                        BD = doc.data();
                        existeGlobal = true;
                    }
                });

                if (!existeGlobal) {
                    BD = datosIniciales;
                    await setDoc(doc(db, "sistema_ventas_bd", "global"), BD);
                }

                calcularGanancias();
                actualizarPantalla(true);
            } catch (error) {
                console.error("Error al conectar con Firebase:", error);
                alert("Hubo un problema de conexión al cargar la información desde internet.");
            }
        }

        // 2. Subir datos actualizados a la nube
        async function guardarEnAlmacen() {
            try {
                await setDoc(doc(db, "sistema_ventas_bd", "global"), BD);
            } catch (error) {
                console.error("Error al subir cambios a Firebase:", error);
            }
        }

        // Arrancar la app descargando los datos de internet
        document.addEventListener("DOMContentLoaded", () => {
            cargarDatosDeLaNube();
        });

        // Vincular funciones globales al objeto 'window' para que los botones HTML sigan funcionando
        window.cambiarUsuarioSimulado = function() {
            const selector = document.getElementById("selector-vendedor");
            const seccionAdmin = document.getElementById("seccion-administrador");
            
            if (selector.value !== "admin") {
                seccionAdmin.style.display = "none";
            } else {
                seccionAdmin.style.display = "block";
            }
            
            actualizarPantalla(false);
        };

        function calcularGanancias() {
            for (let v in BD.comisiones) {
                BD.comisiones[v].totalVendido = 0;
                BD.comisiones[v].ganancia = 0;
            }

            BD.ventas.forEach(venta => {
                if (BD.comisiones[venta.vendedorId]) {
                    BD.comisiones[venta.vendedorId].totalVendido += venta.monto;
                    BD.comisiones[venta.vendedorId].ganancia = 
                        BD.comisiones[venta.vendedorId].totalVendido * BD.comisiones[venta.vendedorId].porcentaje;
                }
            });
        }

        window.agregarTrabajador = async function() {
            const nombre = prompt("Introduce el nombre del nuevo trabajador:");
            if (!nombre || nombre.trim() === "") return;

            const porcentajeInput = prompt("Introduce el porcentaje de comisión (ejemplo: escribe 10 para el 10%):");
            const porcentajeNum = parseFloat(porcentajeInput);

            if (isNaN(porcentajeNum) || porcentajeNum < 0 || porcentajeNum > 100) {
                alert("Por favor, introduce un número de comisión válido (0 a 100).");
                return;
            }

            const nuevoId = "v" + Date.now();

            BD.comisiones[nuevoId] = {
                nombre: nombre.trim(),
                porcentaje: porcentajeNum / 100,
                totalVendido: 0,
                ganancia: 0
            };

            calcularGanancias();
            actualizarPantalla(true);
            await guardarEnAlmacen();

            alert(`¡Trabajador ${nombre} agregado con éxito y respaldado en la nube!`);
        };

        function actualizarPantalla(reconstruirMenu = false) {
            const selector = document.getElementById("selector-vendedor");
            const usuarioActualId = selector.value;
            const usuarioActualTexto = selector.options[selector.selectedIndex] ? selector.options[selector.selectedIndex].text : "Carlos (Dueño) - ADMIN";

            if (reconstruirMenu) {
                const valorGuardado = selector.value || "admin";
                selector.innerHTML = `<option value="admin">Carlos (Dueño) - ADMIN</option>`;
                for (let key in BD.comisiones) {
                    selector.innerHTML += `<option value="${key}">${BD.comisiones[key].nombre} (Vendedor)</option>`;
                }
                selector.value = valorGuardado;
            }

            const tbodyComisiones = document.getElementById("tabla-comisiones");
            const listaTexto = document.getElementById("lista-trabajadores-texto");
            
            tbodyComisiones.innerHTML = "";
            listaTexto.innerHTML = "";

            for (let key in BD.comisiones) {
                const v = BD.comisiones[key];
                tbodyComisiones.innerHTML += `
                    <tr>
                        <td><b>${v.nombre}</b></td>
                        <td>$${v.totalVendido.toFixed(2)}</td>
                        <td>${(v.porcentaje * 100).toFixed(0)}%</td>
                        <td class="ganancia-verde">$${v.ganancia.toFixed(2)}</td>
                    </tr>
                `;
                listaTexto.innerHTML += `<li>${v.nombre} - (${(v.porcentaje * 100).toFixed(0)}% Comisión)</li>`;
            }

            const tbodyClientes = document.querySelector("#tabla-clientes tbody");
            tbodyClientes.innerHTML = "";
            
            const tituloTabla = document.getElementById("titulo-tabla-clientes");
            if (usuarioActualId === "admin") {
                tituloTabla.textContent = "Control de Clientes y Deudores (Viendo Todo)";
            } else {
                tituloTabla.textContent = `Clientes de ${usuarioActualTexto}`;
            }

            BD.ventas.forEach(venta => {
                if (usuarioActualId === "admin" || venta.vendedorId === usuarioActualId) {
                    let estado = venta.pagado ? "Pagado" : "Pendiente";
                    let clase = venta.pagado ? "estado-pagado" : "estado-pendiente";
                    let deuda = venta.pagado ? "$0.00" : `$${venta.monto.toFixed(2)}`;
                    let accion = venta.pagado ? "Ninguna" : `<button onclick="pagarCredito(${venta.id})">Pagar</button>`;

                    tbodyClientes.innerHTML += `
                        <tr>
                            <td>
                                ${venta.cliente}
                                <span class="vendedor-subtexto">Vendido por: ${venta.vendedorNom}</span>
                            </td>
                            <td class="${clase}">${estado}</td>
                            <td>${deuda}</td>
                            <td>${accion}</td>
                        </tr>
                    `;
                }
            });
        }

        window.guardarVenta = async function() {
            const inputCliente = document.getElementById("nombre-cliente");
            const inputMonto = document.getElementById("monto-total");
            const checkCredito = document.getElementById("es-credito");
            const selector = document.getElementById("selector-vendedor");

            const monto = parseFloat(inputMonto.value);

            if (inputCliente.value.trim() === "" || isNaN(monto) || monto <= 0) {
                alert("Por favor, introduce un nombre válido y un monto mayor a 0.");
                return;
            }

            const nuevaVenta = {
                id: Date.now(),
                cliente: inputCliente.value.trim(),
                monto: monto,
                vendedorId: selector.value,
                vendedorNom: selector.options[selector.selectedIndex].text,
                credito: checkCredito.checked,
                pagado: !checkCredito.checked
            };

            BD.ventas.push(nuevaVenta);
            
            calcularGanancias();
            actualizarPantalla(false);
            await guardarEnAlmacen();

            inputCliente.value = "";
            inputMonto.value = "";
            checkCredito.checked = false;

            alert("¡Venta guardada exitosamente en la nube!");
        };

        window.pagarCredito = async function(idVenta) {
            const venta = BD.ventas.find(v => v.id === idVenta);
            if (venta) {
                venta.pagado = true;
                actualizarPantalla(false);
                await guardarEnAlmacen();
                alert("¡Crédito pagado y sincronizado en internet!");
            }
        };

        window.reiniciarTodo = async function() {
            if (confirm("¿Quieres borrar absolutamente todos los datos guardados en la nube y reiniciar de fábrica?")) {
                BD = JSON.parse(JSON.stringify(datosIniciales)); 
                calcularGanancias();
                actualizarPantalla(true);
                await guardarEnAlmacen();
                alert("Base de datos en la nube restablecida.");
            }
        };
    </script>
</body>
</html>
